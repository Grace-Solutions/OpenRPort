#=============================================================================
# OPENRPORT - Unified stack (Server + Pairing + UI)
# https://github.com/openrport/openrport
#=============================================================================
#
# CREDENTIALS:
#   API user/password: admin / ${RPORTD_API_PASSWORD}  (see .env)
#   rport agent auth : ${RPORTD_CLIENT_AUTH}           (see .env)
#
# PRODUCTION SETUP:
#   1. cp .env.example .env && edit secrets
#   2. make prepare      (fetches agent binaries, generates configs)
#   3. make up           (build + start)
#   4. Point your edge reverse proxy at the published ports below
#      and use docs/nginx.sample.conf as a starting point.
#
# ENDPOINTS (each service is published independently; route at the edge):
#   - SERVER_CLIENT_PUBLISH_PORT (8081) -> rportd chisel WS (agent connect)
#   - SERVER_API_PUBLISH_PORT    (8080) -> rportd HTTP API   (/api/v1/*)
#   - PAIRING_PUBLISH_PORT       (9978) -> rport-pairing
#                                          + static agent binaries at
#                                          ${OPENRPORT_BINARIES_BASE_PATH}/*
#   - UI_PUBLISH_PORT            (3000) -> Nuxt UI
#
# Bind address for all published ports is ${OPENRPORT_BIND_ADDRESS:-0.0.0.0}
# so an edge proxy on a different node can reach this host directly.
#
#=============================================================================

name: '${STACK_NAME:-stk-openrport-00001}'

networks:
  EXTERNAL:
    name: 'OPENRPORT-EXTERNAL'
    driver: bridge
    internal: false
    attachable: true
  INTERNAL:
    name: 'OPENRPORT-INTERNAL'
    driver: bridge
    internal: true
    attachable: true

services:
  Server:
    build:
      context: .
      dockerfile: Container/Server/Dockerfile
    image: 'openrport/server:local'
    container_name: 'OPENRPORT-SERVER-00001'
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - .env
    environment:
      OPENRPORT_DEPLOYMENT_MODE: '${OPENRPORT_DEPLOYMENT_MODE:-subpath}'
      OPENRPORT_SERVER_PUBLIC_URL: '${OPENRPORT_SERVER_PUBLIC_URL:-}'
      OPENRPORT_PAIRING_PUBLIC_URL: '${OPENRPORT_PAIRING_PUBLIC_URL:-}'
      OPENRPORT_PAIRING_BASE_PATH: '${OPENRPORT_PAIRING_BASE_PATH:-/pairing}'
      SERVER_API_INTERNAL_PORT: '${SERVER_API_INTERNAL_PORT:-8080}'
      SERVER_CLIENT_INTERNAL_PORT: '${SERVER_CLIENT_INTERNAL_PORT:-8081}'
      RPORTD_API_USER: '${RPORTD_API_USER:-admin}'
      RPORTD_API_PASSWORD: '${RPORTD_API_PASSWORD:-1b9b56df4e046cb62e893b40e19d5899}'
      RPORTD_KEY_SEED: '${RPORTD_KEY_SEED:-4c770f5960d42f4512d2b1f4fd2d81404d4d}'
      RPORTD_JWT_SECRET: '${RPORTD_JWT_SECRET:-nWMPYqXtOFzCt2P517dC9FbjnQTBO0znCu5KExAYTxaXVmWddehvQzEBUbKLFjfuflw=}'
      RPORTD_CLIENT_AUTH: '${RPORTD_CLIENT_AUTH:-clientauth1:d8b1f5dd704773689cdf415b}'
      RPORTD_CORS_ORIGINS: '${RPORTD_CORS_ORIGINS:-*}'
    networks:
      INTERNAL:
      EXTERNAL:
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Server/Config:/etc/rport:rw"
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Server/Data:/var/lib/rport:rw"
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Server/Logs:/var/log/rport:rw"
    ports:
      - "${OPENRPORT_BIND_ADDRESS:-0.0.0.0}:${SERVER_API_PUBLISH_PORT:-8080}:${SERVER_API_INTERNAL_PORT:-8080}"
      - "${OPENRPORT_BIND_ADDRESS:-0.0.0.0}:${SERVER_CLIENT_PUBLISH_PORT:-8081}:${SERVER_CLIENT_INTERNAL_PORT:-8081}"
    healthcheck:
      # /api/v1/status returns 401 (wget exit 6) without auth or 429 (exit 8)
      # when rate-limited; both prove the API is listening.
      test: ["CMD-SHELL", "wget --tries=1 --timeout=5 -qO- http://localhost:${SERVER_API_INTERNAL_PORT:-8080}/api/v1/status >/dev/null 2>&1; case $$? in 0|3|5|6|7|8) exit 0;; *) exit 1;; esac"]
      start_period: 30s
      interval: 30s
      retries: 5
      timeout: 10s
    logging:
      driver: 'local'
    labels:
      com.centurylinklabs.watchtower.enable: '${SERVER_ENABLEAUTOMATICUPDATES:-false}'

  Pairing:
    build:
      context: .
      dockerfile: Container/Pairing/Dockerfile
    image: 'openrport/pairing:local'
    container_name: 'OPENRPORT-PAIRING-00001'
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - .env
    environment:
      OPENRPORT_DEPLOYMENT_MODE: '${OPENRPORT_DEPLOYMENT_MODE:-subpath}'
      OPENRPORT_PAIRING_PUBLIC_URL: '${OPENRPORT_PAIRING_PUBLIC_URL:-}'
      OPENRPORT_PAIRING_BASE_PATH: '${OPENRPORT_PAIRING_BASE_PATH:-/pairing}'
      PAIRING_INTERNAL_PORT: '${PAIRING_INTERNAL_PORT:-9978}'
      RPORT_PAIRING_BINARIES_DIR: '/usr/share/rport-pairing/binaries'
      RPORT_PAIRING_BINARIES_PATH: '${OPENRPORT_BINARIES_BASE_PATH:-/binaries}'
    networks:
      INTERNAL:
      EXTERNAL:
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Pairing/Config:/etc/rport-pairing:rw"
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Pairing/Logs:/var/log/rport-pairing:rw"
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Binaries/Data:/usr/share/rport-pairing/binaries:ro"
    ports:
      - "${OPENRPORT_BIND_ADDRESS:-0.0.0.0}:${PAIRING_PUBLISH_PORT:-9978}:${PAIRING_INTERNAL_PORT:-9978}"
    healthcheck:
      test: ["CMD-SHELL", "wget --tries=1 --timeout=5 -qO- http://localhost:${PAIRING_INTERNAL_PORT:-9978}/update >/dev/null 2>&1; case $$? in 0|3|5|6|7|8) exit 0;; *) exit 1;; esac"]
      start_period: 15s
      interval: 30s
      retries: 5
      timeout: 10s
    logging:
      driver: 'local'
    labels:
      com.centurylinklabs.watchtower.enable: '${PAIRING_ENABLEAUTOMATICUPDATES:-false}'

  UI:
    build:
      context: .
      dockerfile: Container/Ui/Dockerfile
      args:
        NUXT_APP_BASE_URL: '${OPENRPORT_UI_BASE_PATH:-/ui}'
    image: 'openrport/ui:local'
    container_name: 'OPENRPORT-UI-00001'
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - .env
    environment:
      NUXT_APP_BASE_URL: '${OPENRPORT_UI_BASE_PATH:-/ui}'
      NUXT_PUBLIC_API_URL: '${OPENRPORT_SERVER_API_URL:-${OPENRPORT_SERVER_PUBLIC_URL:-}}'
      NUXT_PUBLIC_AUTH_MODE: '${OPENRPORT_UI_AUTH_MODE:-both}'
      UI_INTERNAL_PORT: '${UI_INTERNAL_PORT:-3000}'
    networks:
      INTERNAL:
      EXTERNAL:
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${OPENRPORT_BIND_ADDRESS:-0.0.0.0}:${UI_PUBLISH_PORT:-3000}:${UI_INTERNAL_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget --tries=1 --timeout=5 -qO- http://localhost:${UI_INTERNAL_PORT:-3000}/ >/dev/null 2>&1 || exit 1"]
      start_period: 30s
      interval: 30s
      retries: 5
      timeout: 10s
    logging:
      driver: 'local'
    labels:
      com.centurylinklabs.watchtower.enable: '${UI_ENABLEAUTOMATICUPDATES:-false}'
