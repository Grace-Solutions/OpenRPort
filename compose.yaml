#=============================================================================
# OPENRPORT - Unified stack (Server + Pairing + UI)
#
# Repository : https://github.com/Grace-Solutions/OpenRPort
# Upstream   : https://github.com/openrport/openrport
# Images     : https://hub.docker.com/r/gsoperator/openrport-server
#              https://hub.docker.com/r/gsoperator/openrport-pairing
#              https://hub.docker.com/r/gsoperator/openrport-ui
#=============================================================================
#
# CREDENTIALS:
#   API user/password: admin / ${RPORTD_API_PASSWORD}  (see .env)
#   rport agent auth : ${RPORTD_CLIENT_AUTH}           (see .env)
#
# PRODUCTION SETUP:
#   1. cp .env.example .env && edit secrets
#   2. make prepare      (fetches agent binaries, generates configs)
#   3. make up           (= docker compose pull && docker compose up -d)
#   4. Point your edge reverse proxy at the host ports below
#      and use examples/nginx.sample.conf as a starting point.
#
# IMAGES:
#   This file is runtime-only -- it just references images by name. The
#   three services are pulled from a Docker registry; no local build is
#   performed. Each service has its own fully-qualified image name in a
#   single variable so any of them can be swapped independently (private
#   fork of just the UI, custom server build, etc.) without touching the
#   other two:
#
#     OPENRPORT_SERVER_IMAGE   default: gsoperator/openrport-server
#     OPENRPORT_PAIRING_IMAGE  default: gsoperator/openrport-pairing
#     OPENRPORT_UI_IMAGE       default: gsoperator/openrport-ui
#     OPENRPORT_IMAGE_TAG      default: latest
#
#   The image variable holds the full registry path (host + namespace +
#   repository), so any of these are valid values:
#
#     gsoperator/openrport-server                       (Docker Hub)
#     ghcr.io/grace-solutions/openrport-server          (GHCR)
#     localhost:5000/openrport-server                   (local registry)
#     my-registry.internal/openrport/server             (private mirror)
#
#   Pin OPENRPORT_IMAGE_TAG to a short commit SHA for reproducible deploys.
#
# LOCAL DEVELOPMENT:
#   `make build` overlays compose.build.yaml on top of this file and
#   rebuilds the three images locally. The build retags them with the
#   exact same name as the runtime references in this file, so the
#   resulting `docker compose up` uses the local build instead of the
#   registry copy.
#
# NETWORKING:
#   All three services run with network_mode: host. They listen directly on
#   the host's network namespace -- no docker-proxy, no NAT, no published
#   ports. This keeps the agent tunnel port pool (default 20000-30000)
#   reachable without enumerating thousands of port mappings, and gives the
#   operator one knob per service to control the bind address (defaulting
#   to OPENRPORT_BIND_ADDRESS, typically 0.0.0.0 on a dedicated stack host
#   or 127.0.0.1 when collocated with the edge reverse proxy on a VPS).
#
# ENDPOINTS (each service listens on its own port on ${BIND_ADDRESS}):
#   - SERVER_API_INTERNAL_PORT    (38100) -> rportd HTTP API   (/api/v1/*)
#   - SERVER_CLIENT_INTERNAL_PORT (38101) -> rportd chisel WS (agent connect,
#                                            HTTP Upgrade)
#   - PAIRING_INTERNAL_PORT       (38102) -> rport-pairing
#                                            + static agent binaries at
#                                            ${OPENRPORT_BINARIES_BASE_PATH}/*
#   - UI_INTERNAL_PORT            (38103) -> Nuxt UI
#   - 38200-38400                         -> agent reverse-tunnel pool, owned
#                                            by rportd (raw TCP listeners);
#                                            configurable via
#                                            OPENRPORT_TUNNEL_USED_PORTS /
#                                            OPENRPORT_TUNNEL_EXCLUDED_PORTS
#
#=============================================================================

name: '${STACK_NAME:-stk-openrport-00001}'

services:
  Server:
    image: '${OPENRPORT_SERVER_IMAGE:-gsoperator/openrport-server}:${OPENRPORT_IMAGE_TAG:-latest}'
    container_name: 'OPENRPORT-SERVER-00001'
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - .env
    environment:
      OPENRPORT_DEPLOYMENT_MODE: '${OPENRPORT_DEPLOYMENT_MODE:-subpath}'
      OPENRPORT_SERVER_PUBLIC_URL: '${OPENRPORT_SERVER_PUBLIC_URL:-}'
      OPENRPORT_PAIRING_PUBLIC_URL: '${OPENRPORT_PAIRING_PUBLIC_URL:-}'
      OPENRPORT_PAIRING_BASE_PATH: '${OPENRPORT_PAIRING_BASE_PATH:-/pairing}'
      SERVER_API_INTERNAL_PORT: '${SERVER_API_INTERNAL_PORT:-38100}'
      SERVER_CLIENT_INTERNAL_PORT: '${SERVER_CLIENT_INTERNAL_PORT:-38101}'
      RPORTD_API_USER: '${RPORTD_API_USER:-admin}'
      RPORTD_API_PASSWORD: '${RPORTD_API_PASSWORD:-1b9b56df4e046cb62e893b40e19d5899}'
      RPORTD_KEY_SEED: '${RPORTD_KEY_SEED:-4c770f5960d42f4512d2b1f4fd2d81404d4d}'
      RPORTD_JWT_SECRET: '${RPORTD_JWT_SECRET:-nWMPYqXtOFzCt2P517dC9FbjnQTBO0znCu5KExAYTxaXVmWddehvQzEBUbKLFjfuflw=}'
      RPORTD_CLIENT_AUTH: '${RPORTD_CLIENT_AUTH:-clientauth1:d8b1f5dd704773689cdf415b}'
      RPORTD_CORS_ORIGINS: '${RPORTD_CORS_ORIGINS:-*}'
    network_mode: host
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Server/Config:/etc/rport:rw"
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Server/Data:/var/lib/rport:rw"
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Server/Logs:/var/log/rport:rw"
    # Documentary only -- network_mode: host means the listed ports are bound
    # directly on the host. The actual bind address is set per-service in the
    # generated rportd.conf via OPENRPORT_SERVER_*_BIND_ADDRESS.
    expose:
      - "${SERVER_API_INTERNAL_PORT:-38100}"
      - "${SERVER_CLIENT_INTERNAL_PORT:-38101}"
      - "${OPENRPORT_TUNNEL_USED_PORTS:-38200-38400}"
    healthcheck:
      # /api/v1/status returns 401 (wget exit 6) without auth or 429 (exit 8)
      # when rate-limited; both prove the API is listening.
      test: ["CMD-SHELL", "wget --tries=1 --timeout=5 -qO- http://localhost:${SERVER_API_INTERNAL_PORT:-38100}/api/v1/status >/dev/null 2>&1; case $$? in 0|3|5|6|7|8) exit 0;; *) exit 1;; esac"]
      start_period: 30s
      interval: 30s
      retries: 5
      timeout: 10s
    logging:
      driver: 'local'
    labels:
      com.centurylinklabs.watchtower.enable: '${SERVER_ENABLEAUTOMATICUPDATES:-false}'

  Pairing:
    image: '${OPENRPORT_PAIRING_IMAGE:-gsoperator/openrport-pairing}:${OPENRPORT_IMAGE_TAG:-latest}'
    container_name: 'OPENRPORT-PAIRING-00001'
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - .env
    environment:
      OPENRPORT_DEPLOYMENT_MODE: '${OPENRPORT_DEPLOYMENT_MODE:-subpath}'
      OPENRPORT_PAIRING_PUBLIC_URL: '${OPENRPORT_PAIRING_PUBLIC_URL:-}'
      OPENRPORT_PAIRING_BASE_PATH: '${OPENRPORT_PAIRING_BASE_PATH:-/pairing}'
      PAIRING_INTERNAL_PORT: '${PAIRING_INTERNAL_PORT:-38102}'
      RPORT_PAIRING_BINARIES_DIR: '/usr/share/rport-pairing/binaries'
      RPORT_PAIRING_BINARIES_PATH: '${OPENRPORT_BINARIES_BASE_PATH:-/binaries}'
    network_mode: host
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Pairing/Config:/etc/rport-pairing:rw"
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Pairing/Logs:/var/log/rport-pairing:rw"
      - "${STACK_BINDMOUNTROOT:-/mnt/data/docker/stacks}/OpenRPort/Binaries/Data:/usr/share/rport-pairing/binaries:ro"
    expose:
      - "${PAIRING_INTERNAL_PORT:-38102}"
    healthcheck:
      test: ["CMD-SHELL", "wget --tries=1 --timeout=5 -qO- http://localhost:${PAIRING_INTERNAL_PORT:-38102}/update >/dev/null 2>&1; case $$? in 0|3|5|6|7|8) exit 0;; *) exit 1;; esac"]
      start_period: 15s
      interval: 30s
      retries: 5
      timeout: 10s
    logging:
      driver: 'local'
    labels:
      com.centurylinklabs.watchtower.enable: '${PAIRING_ENABLEAUTOMATICUPDATES:-false}'

  UI:
    image: '${OPENRPORT_UI_IMAGE:-gsoperator/openrport-ui}:${OPENRPORT_IMAGE_TAG:-latest}'
    container_name: 'OPENRPORT-UI-00001'
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - .env
    environment:
      NUXT_APP_BASE_URL: '${OPENRPORT_UI_BASE_PATH:-/ui}'
      NUXT_PUBLIC_API_URL: '${OPENRPORT_SERVER_API_URL:-${OPENRPORT_SERVER_PUBLIC_URL:-}}'
      NUXT_PUBLIC_AUTH_MODE: '${OPENRPORT_UI_AUTH_MODE:-both}'
      UI_INTERNAL_PORT: '${UI_INTERNAL_PORT:-38103}'
      OPENRPORT_UI_BIND_ADDRESS: '${OPENRPORT_UI_BIND_ADDRESS:-${OPENRPORT_BIND_ADDRESS:-0.0.0.0}}'
    network_mode: host
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "${UI_INTERNAL_PORT:-38103}"
    healthcheck:
      test: ["CMD-SHELL", "wget --tries=1 --timeout=5 -qO- http://localhost:${UI_INTERNAL_PORT:-38103}/ >/dev/null 2>&1 || exit 1"]
      start_period: 30s
      interval: 30s
      retries: 5
      timeout: 10s
    logging:
      driver: 'local'
    labels:
      com.centurylinklabs.watchtower.enable: '${UI_ENABLEAUTOMATICUPDATES:-false}'
