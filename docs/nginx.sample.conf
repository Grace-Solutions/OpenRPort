# OpenRPort Unified - sample nginx reverse-proxy configuration
#
# Single edge proxy that fronts the three published services of the OpenRPort
# stack. Each service is published on its own host port (see .env: *_PUBLISH_PORT)
# and is routed here by URL prefix. The stack ships with no internal proxy
# layer; this is the only proxy in the path.
#
# The Pairing service serves both the pairing endpoints and the static agent
# binaries from a single port; binaries live under
# ${OPENRPORT_BINARIES_BASE_PATH:-/binaries}/* on the pairing upstream.
#
# Substitute the variables in {curly braces} for your environment:
#   {SERVER_NAME}                 - DNS name of this edge, e.g. rport.example.com
#   {STACK_HOST}                  - host running the OpenRPort stack
#                                   (127.0.0.1 if collocated, else its LAN IP)
#   {SERVER_API_PUBLISH_PORT}     - default 38100  (rportd HTTP API)
#   {SERVER_CLIENT_PUBLISH_PORT}  - default 38101  (rportd chisel WS)
#   {PAIRING_PUBLISH_PORT}        - default 38102  (rport-pairing + binaries)
#   {UI_PUBLISH_PORT}             - default 38103  (Nuxt UI)

# nginx requires this map at http{} scope. Place it in your top-level
# nginx.conf if your include layout splits server{} blocks into separate
# files; otherwise leave it here.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name rport.example.com;
    return 301 https://$server_name$request_uri;
}

# ---------- HTTPS edge ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rport.example.com;

    ssl_certificate     /etc/nginx/ssl/example.com_fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/example.com_private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/rport.example.com_access.log;
    error_log  /var/log/nginx/rport.example.com_error.log;

    # rport agents push moderate file sizes; tunnel data goes through chisel
    # (HTTP Upgrade) and is not bound by this limit.
    client_max_body_size 10M;
    proxy_read_timeout   86400s;
    proxy_send_timeout   86400s;

    # Common proxy headers reused by every location block below.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # ---------- rportd HTTP API ----------
    location /api/ {
        proxy_pass http://127.0.0.1:38100;         # SERVER_API_PUBLISH_PORT
    }

    # ---------- Nuxt UI ----------
    location /ui/ {
        proxy_pass http://127.0.0.1:38103;         # UI_PUBLISH_PORT
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---------- Static agent binaries (served by pairing) ----------
    # The pairing service hosts the pre-fetched agent binaries under
    # /binaries/* (see RPORT_PAIRING_BINARIES_PATH in compose.yaml). One
    # upstream, one container, one port.
    location /binaries/ {
        proxy_pass http://127.0.0.1:38102;         # PAIRING_PUBLISH_PORT
    }

    # ---------- rport-pairing ----------
    # Upstream rport-pairing emits install scripts that hard-code
    # https://download.openrport.io/... URLs. The rewrite happens at the
    # edge: sub_filter swaps those URLs for the local /binaries/... paths
    # also served by the pairing upstream. proxy_set_header Accept-Encoding ""
    # is required for sub_filter to see the body.
    location /pairing/ {
        proxy_pass http://127.0.0.1:38102/;        # PAIRING_PUBLISH_PORT
        proxy_set_header Accept-Encoding "";

        sub_filter_once  off;
        sub_filter_types text/plain application/x-sh application/octet-stream;
        sub_filter 'https://download.openrport.io/rport/stable'
                   'https://rport.example.com/binaries/rport/stable';
        sub_filter 'https://downloads.openrport.io/rport/stable'
                   'https://rport.example.com/binaries/rport/stable';
        sub_filter 'https://download.openrport.io/tacoscript/stable'
                   'https://rport.example.com/binaries/tacoscript/stable';
    }

    # ---------- rportd agent connect (chisel WS) ----------
    # Catch-all: agents connect over chisel WS to https://<edge>/ via
    # HTTP Upgrade, which is forwarded to the rportd client port.
    location / {
        proxy_pass http://127.0.0.1:38101;         # SERVER_CLIENT_PUBLISH_PORT
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# ---------- Notes ----------
# 1. Agent connect: chisel uses HTTP Upgrade so no stream{} listener is
#    required. The catch-all "/" location forwards it to the rportd client
#    port (SERVER_CLIENT_PUBLISH_PORT, default 38101).
# 2. Install-script flow:
#      curl https://rport.example.com/pairing/<7-char-code> | sh
#    The sub_filter rules above rewrite the upstream pairing script's
#    download.openrport.io URLs to https://rport.example.com/binaries/...
#    so agents pull binaries from this server (or, if RPORT_S3_BUCKET is
#    set, from your S3 bucket via the Binaries layer).
# 3. UI:  https://rport.example.com/ui/        (admin / RPORTD_API_PASSWORD)
# 4. API: https://rport.example.com/api/v1/*
# 5. Binaries:
#      https://rport.example.com/binaries/rport/stable/<arch>.tar.gz
#      https://rport.example.com/binaries/manifest.json
