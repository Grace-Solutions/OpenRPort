# OpenRPort Unified - sample HAProxy reverse-proxy configuration
#
# Mirrors examples/nginx.sample.conf and examples/Caddyfile.sample. HAProxy
# terminates TLS on the edge and forwards each prefix to the corresponding
# port on the stack VM.
#
# EXAMPLE DEPLOYMENT (matches .env.example, examples/nginx.sample.conf,
# examples/Caddyfile.sample, and the README topology diagrams):
#
#   Public DNS A records :  rport.example.com         -> 203.0.113.20
#                           tunnels.rport.example.com -> 203.0.113.20
#   Edge firewall / NAT  :  203.0.113.20  (public)
#                           tcp/443             -> 10.0.0.4:443     (this proxy)
#                           tcp+udp/38200-38400 -> 10.0.0.5:38200-* (stack VM)
#   This proxy host      :  10.0.0.4
#   Stack VM (upstream)  :  10.0.0.5
#   rportd API           :  10.0.0.5:38100
#   rportd chisel WS     :  10.0.0.5:38101  (default backend below)
#   rport-pairing + bins :  10.0.0.5:38102
#   Nuxt UI              :  10.0.0.5:38103
#
# Replace 'rport.example.com' with your DNS name and '10.0.0.5' with the
# LAN IP of your stack VM (or 127.0.0.1 if HAProxy and the stack run on
# the same host). Port numbers are the defaults from .env.example.
#
# HAProxy >= 2.4 is assumed. The chisel WebSocket works through the standard
# HTTP frontend - no separate tcp-mode listener is required.

global
    log         /dev/log local0
    maxconn     8192
    user        haproxy
    group       haproxy

defaults
    mode                http
    log                 global
    option              httplog
    option              forwardfor
    option              http-server-close
    timeout connect     5s
    timeout client      86400s        # match nginx proxy_read_timeout for chisel WS
    timeout server      86400s
    timeout tunnel      86400s        # required for the chisel WS upgrade
    timeout http-request 15s

# ---------- HTTP -> HTTPS redirect ----------
frontend rport_http
    bind *:80
    http-request redirect scheme https code 301

# ---------- HTTPS edge ----------
frontend rport_https
    bind *:443 ssl crt /etc/haproxy/ssl/rport.example.com.pem alpn h2,http/1.1
    http-request set-header X-Forwarded-Proto https

    # Path-based routing. Order matters: longest / most specific first.
    use_backend be_api      if { path -m beg /api/ }
    use_backend be_ui       if { path -m beg /ui/ }
    use_backend be_binaries if { path -m beg /binaries/ }
    use_backend be_pairing  if { path -m beg /pairing/ }

    # Catch-all: chisel WS over HTTP Upgrade.
    default_backend be_chisel

# ---------- rportd HTTP API ----------
backend be_api
    server api 10.0.0.5:38100 check    # Server  (rportd HTTP API)

# ---------- Nuxt UI ----------
backend be_ui
    server ui 10.0.0.5:38103 check     # UI      (Nuxt)

# ---------- Static agent binaries (served by pairing) ----------
backend be_binaries
    server binaries 10.0.0.5:38102 check  # Pairing (binaries mount)

# ---------- rport-pairing ----------
# The pairing service serves bare "/", "/update", "/{code}" - strip the
# /pairing/ prefix before forwarding. The pairing service injects the
# configured download URLs directly into the rendered scripts via the
# OPENRPORT_PAIRING_DOWNLOADS_* env vars, so no body rewriting is needed.
backend be_pairing
    http-request replace-path ^/pairing/?(.*)$ /\1
    server pairing 10.0.0.5:38102 check   # Pairing (HTTP endpoints)

# ---------- rportd agent connect (chisel WS) ----------
# Catch-all: agents connect over chisel WS to https://rport.example.com/
# via HTTP Upgrade. HAProxy forwards Upgrade/Connection headers
# transparently when `option http-server-close` and `timeout tunnel` are
# set above.
backend be_chisel
    server chisel 10.0.0.5:38101 check    # Server  (chisel WS)

# ---------- Notes ----------
# 1. TLS cert: HAProxy expects a single PEM file with the full chain
#    followed by the private key. Build it with:
#      cat fullchain.pem privkey.pem > /etc/haproxy/ssl/rport.example.com.pem
#      chmod 600 /etc/haproxy/ssl/rport.example.com.pem
# 2. UI:       https://rport.example.com/ui/   (admin / RPORTD_API_PASSWORD)
# 3. API:      https://rport.example.com/api/v1/*
# 4. Binaries: https://rport.example.com/binaries/rport/stable/<arch>.tar.gz
# 5. Pairing:  curl https://rport.example.com/pairing/<7-char-code> | sh
# 6. Reverse-tunnel ports do NOT pass through HAProxy. The pool defined by
#    OPENRPORT_TUNNEL_USED_PORTS (default 38200-38400, raw TCP/UDP) must be
#    forwarded directly from the edge firewall to the stack VM (10.0.0.5
#    in this example), NOT to this proxy. HAProxy can run a `mode tcp`
#    frontend per port but the firewall DNAT is simpler and avoids HAProxy
#    state for non-HTTP traffic. .env.example sets
#    OPENRPORT_TUNNEL_HOST=tunnels.rport.example.com so rportd-generated
#    tunnel links bypass this proxy entirely. Point the
#    tunnels.rport.example.com A record at the same public IP and DNAT the
#    pool ports straight to the stack VM.
