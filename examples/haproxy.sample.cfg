# OpenRPort Unified - sample HAProxy reverse-proxy configuration
#
# Mirrors docs/nginx.sample.conf and docs/Caddyfile.sample. HAProxy
# terminates TLS on the edge (203.0.113.20 / public DNS = SERVER_NAME) and
# forwards each prefix to the corresponding port on the stack VM
# (STACK_HOST = 10.0.0.5).
#
# Substitute for your environment:
#   SERVER_NAME                  - DNS name of this edge, e.g. rport.example.com
#   STACK_HOST                   - LAN IP of the Linux VM running the docker
#                                  stack. Use 127.0.0.1 only if HAProxy and the
#                                  stack run on the same VM. The samples below
#                                  assume HAProxy is on a separate host:
#                                      proxy host  10.0.0.4
#                                      stack VM    10.0.0.5   <- STACK_HOST
#   SERVER_API_PUBLISH_PORT      - default 38100  (rportd HTTP API)
#   SERVER_CLIENT_PUBLISH_PORT   - default 38101  (rportd chisel WS)
#   PAIRING_PUBLISH_PORT         - default 38102  (rport-pairing + binaries)
#   UI_PUBLISH_PORT              - default 38103  (Nuxt UI)
#
# HAProxy >= 2.4 is assumed. The chisel WebSocket works through the standard
# HTTP frontend - no separate tcp-mode listener is required.

global
    log         /dev/log local0
    maxconn     8192
    user        haproxy
    group       haproxy

defaults
    mode                http
    log                 global
    option              httplog
    option              forwardfor
    option              http-server-close
    timeout connect     5s
    timeout client      86400s        # match nginx proxy_read_timeout for chisel WS
    timeout server      86400s
    timeout tunnel      86400s        # required for the chisel WS upgrade
    timeout http-request 15s

# ---------- HTTP -> HTTPS redirect ----------
frontend rport_http
    bind *:80
    http-request redirect scheme https code 301

# ---------- HTTPS edge ----------
frontend rport_https
    bind *:443 ssl crt /etc/haproxy/ssl/rport.example.com.pem alpn h2,http/1.1
    http-request set-header X-Forwarded-Proto https

    # Path-based routing. Order matters: longest / most specific first.
    use_backend be_api      if { path -m beg /api/ }
    use_backend be_ui       if { path -m beg /ui/ }
    use_backend be_binaries if { path -m beg /binaries/ }
    use_backend be_pairing  if { path -m beg /pairing/ }

    # Catch-all: chisel WS over HTTP Upgrade.
    default_backend be_chisel

# ---------- rportd HTTP API ----------
backend be_api
    server api 10.0.0.5:38100 check    # STACK_HOST:SERVER_API_PUBLISH_PORT

# ---------- Nuxt UI ----------
backend be_ui
    server ui 10.0.0.5:38103 check     # STACK_HOST:UI_PUBLISH_PORT

# ---------- Static agent binaries (served by pairing) ----------
backend be_binaries
    server binaries 10.0.0.5:38102 check  # STACK_HOST:PAIRING_PUBLISH_PORT

# ---------- rport-pairing ----------
# The pairing service serves bare "/", "/update", "/{code}" - strip the
# /pairing/ prefix before forwarding. The pairing service injects the
# configured download URLs directly into the rendered scripts via the
# OPENRPORT_PAIRING_DOWNLOADS_* env vars, so no body rewriting is needed.
backend be_pairing
    http-request replace-path ^/pairing/?(.*)$ /\1
    server pairing 10.0.0.5:38102 check   # STACK_HOST:PAIRING_PUBLISH_PORT

# ---------- rportd agent connect (chisel WS) ----------
# Catch-all: agents connect over chisel WS to https://<edge>/ via HTTP
# Upgrade. HAProxy forwards Upgrade/Connection headers transparently when
# `option http-server-close` and `timeout tunnel` are set above.
backend be_chisel
    server chisel 10.0.0.5:38101 check    # STACK_HOST:SERVER_CLIENT_PUBLISH_PORT

# ---------- Notes ----------
# 1. TLS cert: HAProxy expects a single PEM file with the full chain
#    followed by the private key. Build it with:
#      cat fullchain.pem privkey.pem > /etc/haproxy/ssl/rport.example.com.pem
#      chmod 600 /etc/haproxy/ssl/rport.example.com.pem
# 2. UI:       https://rport.example.com/ui/   (admin / RPORTD_API_PASSWORD)
# 3. API:      https://rport.example.com/api/v1/*
# 4. Binaries: https://rport.example.com/binaries/rport/stable/<arch>.tar.gz
# 5. Pairing:  curl https://rport.example.com/pairing/<7-char-code> | sh
# 6. Reverse-tunnel ports do NOT pass through HAProxy. The pool defined by
#    OPENRPORT_TUNNEL_USED_PORTS (default 38200-38400, raw TCP/UDP) must be
#    forwarded directly from the edge firewall to STACK_HOST, NOT to this
#    proxy. HAProxy can run a `mode tcp` frontend per port but the firewall
#    DNAT is simpler and avoids HAProxy state for non-HTTP traffic. Set
#    OPENRPORT_TUNNEL_HOST to a DNS name resolving to STACK_HOST
#    (e.g. tunnels.rport.example.com) so rportd-generated tunnel links
#    bypass the proxy entirely.
