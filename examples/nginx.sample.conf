# OpenRPort Unified - sample nginx reverse-proxy configuration
#
# Single edge proxy that fronts the three published services of the OpenRPort
# stack. Each service is published on its own host port (see .env: *_PUBLISH_PORT)
# and is routed here by URL prefix. The stack ships with no internal proxy
# layer; this is the only proxy in the path.
#
# The Pairing service serves both the pairing endpoints and the static agent
# binaries from a single port; binaries live under
# ${OPENRPORT_BINARIES_BASE_PATH:-/binaries}/* on the pairing upstream.
#
# EXAMPLE DEPLOYMENT (matches .env.example, examples/Caddyfile.sample,
# examples/haproxy.sample.cfg, and the README topology diagrams):
#
#   Public DNS A records :  rport.example.com         -> 203.0.113.20
#                           tunnels.rport.example.com -> 203.0.113.20
#   Edge firewall / NAT  :  203.0.113.20  (public)
#                           tcp/443             -> 10.0.0.4:443     (this proxy)
#                           tcp+udp/38200-38400 -> 10.0.0.5:38200-* (stack VM)
#   This proxy host      :  10.0.0.4
#   Stack VM (upstream)  :  10.0.0.5
#   rportd API           :  10.0.0.5:38100
#   rportd chisel WS     :  10.0.0.5:38101  (catch-all upstream below)
#   rport-pairing + bins :  10.0.0.5:38102
#   Nuxt UI              :  10.0.0.5:38103
#
# Replace 'rport.example.com' with your DNS name, '10.0.0.5' with the LAN
# IP of your stack VM (or 127.0.0.1 if nginx and the stack run on the
# same host), and the cert paths with your own. Port numbers are the
# defaults from .env.example -- override there and copy here in lockstep.

# nginx requires this map at http{} scope. Place it in your top-level
# nginx.conf if your include layout splits server{} blocks into separate
# files; otherwise leave it here.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name rport.example.com;
    return 301 https://$server_name$request_uri;
}

# ---------- HTTPS edge ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rport.example.com;

    ssl_certificate     /etc/nginx/ssl/example.com_fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/example.com_private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/rport.example.com_access.log;
    error_log  /var/log/nginx/rport.example.com_error.log;

    # rport agents push moderate file sizes; tunnel data goes through chisel
    # (HTTP Upgrade) and is not bound by this limit.
    client_max_body_size 10M;
    proxy_read_timeout   86400s;
    proxy_send_timeout   86400s;

    # Common proxy headers reused by every location block below.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # ---------- rportd HTTP API ----------
    location /api/ {
        proxy_pass http://10.0.0.5:38100;          # Server  (rportd HTTP API)
    }

    # ---------- Nuxt UI ----------
    location /ui/ {
        proxy_pass http://10.0.0.5:38103;          # UI      (Nuxt)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---------- Static agent binaries (served by pairing) ----------
    # The pairing service hosts the pre-fetched agent binaries under
    # /binaries/* (see RPORT_PAIRING_BINARIES_PATH in compose.yaml). One
    # upstream, one container, one port.
    location /binaries/ {
        proxy_pass http://10.0.0.5:38102;          # Pairing (binaries mount)
    }

    # ---------- rport-pairing ----------
    # The pairing service injects the configured download URLs directly into
    # the rendered scripts (see OPENRPORT_PAIRING_DOWNLOADS_* in .env), so the
    # edge only needs to strip the /pairing/ prefix. No sub_filter rewriting
    # is required.
    location /pairing/ {
        proxy_pass http://10.0.0.5:38102/;         # Pairing (HTTP endpoints)
    }

    # ---------- rportd agent connect (chisel WS) ----------
    # Catch-all: agents connect over chisel WS to https://rport.example.com/
    # via HTTP Upgrade, which is forwarded to the rportd client port.
    location / {
        proxy_pass http://10.0.0.5:38101;          # Server  (chisel WS)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# ---------- Notes ----------
# 1. Agent connect: chisel uses HTTP Upgrade so no stream{} listener is
#    required. The catch-all "/" location forwards it to the rportd client
#    port (SERVER_CLIENT_PUBLISH_PORT, default 38101).
# 2. Install-script flow:
#      curl https://rport.example.com/pairing/<7-char-code> | sh
#    The pairing service templates inject the operator-configured download
#    URLs (OPENRPORT_PAIRING_DOWNLOADS_BINARIES_BASE_URL etc.) directly into
#    the rendered installer, so agents pull binaries from this server (or,
#    if RPORT_S3_BUCKET is set, from your S3 bucket via the Binaries layer).
# 3. UI:  https://rport.example.com/ui/        (admin / RPORTD_API_PASSWORD)
# 4. API: https://rport.example.com/api/v1/*
# 5. Binaries:
#      https://rport.example.com/binaries/rport/stable/<arch>.tar.gz
#      https://rport.example.com/binaries/manifest.json
# 6. Reverse-tunnel ports do NOT pass through nginx. The pool defined by
#    OPENRPORT_TUNNEL_USED_PORTS (default 38200-38400, raw TCP/UDP) must be
#    forwarded directly from the edge firewall to the stack VM (10.0.0.5
#    in this example), NOT to this proxy. nginx cannot forward arbitrary
#    TCP/UDP without a stream{} block, and even with one it adds no value
#    here. .env.example sets OPENRPORT_TUNNEL_HOST=tunnels.rport.example.com
#    so rportd-generated tunnel links bypass this proxy entirely. Point the
#    tunnels.rport.example.com A record at the same public IP and DNAT the
#    pool ports straight to the stack VM.
