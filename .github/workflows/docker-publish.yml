#=============================================================================
# Build and publish OpenRPort container images.
#
# Repository : https://github.com/Grace-Solutions/OpenRPort
# Images     : https://hub.docker.com/r/gsoperator/openrport-server
#              https://hub.docker.com/r/gsoperator/openrport-pairing
#              https://hub.docker.com/r/gsoperator/openrport-ui
#
# Triggers:
#   - push to main           -> :latest + :<short-sha>
#   - tag push (v*)          -> :<semver> + :<major.minor> + :<short-sha>
#                               (and :latest if the tag points at main)
#   - workflow_dispatch      -> manual run, optional custom tag
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME       Docker Hub account or org used for `docker login`
#   DOCKERHUB_TOKEN          Personal Access Token (Read/Write/Delete)
#
# Repository secrets are write-only after creation and are NOT exposed to
# forks or to PR runs from forks. They are only available on `push` events
# from collaborators and on `workflow_dispatch` runs.
#
# To publish under a different Docker Hub org or to a different registry,
# edit the `image_name` field in the matrix below directly. There is no
# namespace indirection -- the full registry path lives in one place per
# service so each can be swapped independently.
#=============================================================================
name: Publish container images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      custom_tag:
        description: 'Extra tag to apply to all three images (optional)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-push:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: server
            image_name: gsoperator/openrport-server
            dockerfile: Container/Server/Dockerfile
            build_args: ''
            readme: Container/Server/README.docker.md
            short_description: 'OpenRPort server (rportd): API, chisel control plane, reverse-tunnel pool'
          - service: pairing
            image_name: gsoperator/openrport-pairing
            dockerfile: Container/Pairing/Dockerfile
            build_args: ''
            readme: Container/Pairing/README.docker.md
            short_description: 'OpenRPort pairing service: agent installer URLs and binary mirror'
          - service: ui
            image_name: gsoperator/openrport-ui
            dockerfile: Container/Ui/Dockerfile
            build_args: |
              NUXT_APP_BASE_URL=/ui
            readme: Container/Ui/README.docker.md
            short_description: 'OpenRPort management UI (Nuxt 3) for rportd'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image_name }}
          # Tagging strategy:
          #   - main branch pushes: :latest, :<short-sha>
          #   - version tags (vX.Y.Z): :X.Y.Z, :X.Y, :<short-sha>
          #   - workflow_dispatch with custom_tag: also apply that tag verbatim
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.custom_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.custom_tag != '' }}
          labels: |
            org.opencontainers.image.title=openrport-${{ matrix.service }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # linux/amd64 only for now. linux/arm64 works via QEMU but the
          # Server build (CGO + sqlite3) takes ~25 min under emulation.
          # To enable: add 'linux/arm64' here and a 'docker/setup-qemu-action'
          # step before the Buildx setup above.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=openrport-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=openrport-${{ matrix.service }}

      - name: Image digest
        run: echo "Pushed ${{ matrix.image_name }} with tags - ${{ steps.meta.outputs.tags }}"

      # Sync the per-image README and short description to Docker Hub. Only
      # runs on main-branch pushes so PR builds and version-tag pushes don't
      # overwrite the published description out-of-band. The action calls the
      # Docker Hub web API (not the registry API) and authenticates with the
      # same DOCKERHUB_TOKEN PAT used to push images.
      - name: Sync README to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ matrix.image_name }}
          short-description: ${{ matrix.short_description }}
          readme-filepath: ${{ matrix.readme }}
